<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منظم المذاكرة</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    direction: rtl;
    background: #f0f0f0;
    color: #333;
    margin: 0;
    padding: 0;
}
.dark {
    background: #121212;
    color: #eee;
}
.container {
    max-width: 750px;
    margin: auto;
    padding: 20px;
}
h1, h2 {
    text-align: center;
}
input[type="text"], input[type="time"] {
    width: 60%;
    padding: 10px;
    margin: 10px 5px 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}
button {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: #e74c3c;
    color: #fff;
    transition: 0.3s;
}
button:hover {
    background: #c0392b;
}
.task {
    background: #fff;
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
}
.task.dark {
    background: #333;
}
.progress {
    font-size: 14px;
    color: #555;
}
#timer {
    font-size: 40px;
    font-weight: bold;
    margin: 10px 0;
    display: block;
}
#weeklyReport {
    font-weight: bold;
    font-size: 16px;
    margin-top: 10px;
}
#reminderMsg {
    color: green;
    margin-top: 5px;
}
</style>
</head>
<body>
<div class="container">
<h1>منظم المذاكرة</h1>

<!-- Section: Add Subjects -->
<div>
<input type="text" id="subject" placeholder="اسم المادة">
<button onclick="addTask()">إضافة مادة</button>
</div>
<div id="taskList"></div>
<div style="text-align:center; margin-top:15px;">
<button onclick="toggleDarkMode()">تبديل الوضع</button>
</div>

<!-- Section: Pomodoro Timer -->
<div style="margin-top:30px; text-align:center;">
<h2>مؤقت Pomodoro</h2>
<span id="timer">25:00</span>
<div>
<button onclick="startTimer()">ابدأ</button>
<button onclick="pauseTimer()">إيقاف مؤقت</button>
<button onclick="resetTimer()">إعادة ضبط</button>
</div>
</div>

<!-- Section: Daily Reminder -->
<div style="margin-top:30px; text-align:center;">
<h2>تذكيرات يومية</h2>
<input type="time" id="reminderTime">
<button onclick="setReminder()">تعيين التذكير</button>
<p id="reminderMsg"></p>
</div>

<!-- Section: Weekly Report -->
<div style="margin-top:30px; text-align:center;">
<h2>تقرير أسبوعي</h2>
<button onclick="generateReport()">عرض تقرير الأسبوع</button>
<div id="weeklyReport"></div>
</div>
</div>

<script>
// ===================== Task Management =====================
let tasks = [];

function addTask() {
    let subject = document.getElementById('subject').value.trim();
    if(subject) {
        let task = {name: subject, progress: 0};
        tasks.push(task);
        renderTasks();
        document.getElementById('subject').value = '';
    }
}

function renderTasks() {
    let taskList = document.getElementById('taskList');
    taskList.innerHTML = '';
    tasks.forEach((task, index) => {
        let div = document.createElement('div');
        div.className = 'task' + (document.body.classList.contains('dark') ? ' dark' : '');
        div.innerHTML = `
        <span>${task.name}</span>
        <span class="progress">${task.progress}%</span>
        <div>
            <button onclick="increaseProgress(${index})">+10%</button>
            <button onclick="deleteTask(${index})">حذف</button>
        </div>`;
        taskList.appendChild(div);
    });
}

function increaseProgress(index) {
    if(tasks[index].progress < 100) {
        tasks[index].progress += 10;
        if(tasks[index].progress > 100) tasks[index].progress = 100;
        renderTasks();
    }
}

function deleteTask(index) {
    tasks.splice(index,1);
    renderTasks();
}

function toggleDarkMode() {
    document.body.classList.toggle('dark');
    renderTasks();
}

// ===================== Pomodoro Timer =====================
let pomodoroTime = 25 * 60; // 25 minutes
let timerInterval;
let isRunning = false;

function startTimer() {
    if(isRunning) return;
    isRunning = true;
    timerInterval = setInterval(() => {
        if(pomodoroTime <= 0){
            clearInterval(timerInterval);
            alert('انتهى الوقت! استراحة 5 دقائق.');
            pomodoroTime = 25 * 60;
            isRunning = false;
            updateTimerDisplay();
            return;
        }
        pomodoroTime--;
        updateTimerDisplay();
    }, 1000);
}

function pauseTimer() {
    clearInterval(timerInterval);
    isRunning = false;
}

function resetTimer() {
    clearInterval(timerInterval);
    pomodoroTime = 25 * 60;
    isRunning = false;
    updateTimerDisplay();
}

function updateTimerDisplay() {
    let minutes = Math.floor(pomodoroTime / 60);
    let seconds = pomodoroTime % 60;
    document.getElementById('timer').textContent = 
        `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
}
updateTimerDisplay();

// ===================== Daily Reminder =====================
function setReminder() {
    const timeInput = document.getElementById('reminderTime').value;
    if(!timeInput) return alert('اختر وقت التذكير!');
    const now = new Date();
    const [hours, minutes] = timeInput.split(':').map(Number);
    let reminderDate = new Date();
    reminderDate.setHours(hours, minutes, 0, 0);
    if(reminderDate < now) reminderDate.setDate(reminderDate.getDate() + 1);
    const timeout = reminderDate - now;
    setTimeout(() => alert('حان وقت المذاكرة!'), timeout);
    document.getElementById('reminderMsg').textContent = `تم تعيين التذكير على الساعة ${timeInput}`;
}

// ===================== Weekly Report =====================
function generateReport() {
    if(tasks.length === 0) {
        document.getElementById('weeklyReport').textContent = 'لا توجد مواد بعد';
        return;
    }
    let totalProgress = tasks.reduce((sum, t) => sum + t.progress, 0);
    let avg = (totalProgress / tasks.length).toFixed(1);
    let report = `عدد المواد: ${tasks.length} | متوسط التقدم: ${avg}%`;
    document.getElementById('weeklyReport').textContent = report;
}
</script>
</body>
</html>
