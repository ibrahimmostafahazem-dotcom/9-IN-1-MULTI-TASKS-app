<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF Converter</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">

<style>
    body {
        font-family: 'Tahoma', sans-serif;
        background: linear-gradient(135deg,#ffe259,#f5f7fa);
        padding:20px;direction:rtl;text-align:center;
        transition:.3s;background-size:400% 400%;
        animation:bgMove 10s ease infinite;
    }
    @keyframes bgMove{0%{background-position:0 0;}50%{background-position:100% 100%;}100%{background-position:0 0;}}
    body.dark{background:#111;color:#eee;}
    .container{
        max-width:700px;margin:auto;background:#fff;
        padding:25px;border-radius:20px;
        box-shadow:0 6px 25px rgba(0,0,0,.12);
        transition:.3s;
    }
    body.dark .container{background:#222;color:#fff;}
    h2{margin-bottom:10px;font-weight:bold;}
    #images{display:none;}
    .upload-btn{
        padding:14px 22px;background:#ffb400;color:#fff;
        border-radius:12px;cursor:pointer;font-size:16px;
        font-weight:bold;display:inline-block;transition:.2s;
    }
    .upload-btn:hover{background:#e09e00;}
    #preview{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:15px;}
    .img-box{
        width:100px;height:100px;border-radius:12px;overflow:hidden;
        border:2px solid #ddd;position:relative;cursor:grab;transition:.2s;
    }
    .img-box:hover{transform:scale(1.05);}
    .img-box img{width:100%;height:100%;object-fit:cover;}
    .remove-btn{
        position:absolute;top:5px;left:5px;width:22px;height:22px;
        background:rgba(255,0,0,.7);border-radius:50%;color:#fff;
        line-height:22px;font-size:14px;cursor:pointer;font-weight:bold;
    }
button{
        padding:14px;background:#2ecc71;color:#fff;border:none;
        border-radius:12px;width:100%;cursor:pointer;font-size:18px;
        margin-top:20px;transition:.2s;
    }
    button:hover{background:#26a65b;}
    .options{
        margin-top:20px;background:#f7f7f7;padding:12px;
        border-radius:12px;text-align:right;
    }
    body.dark .options{background:#333;}
    .dragging{opacity:.4;border:2px dashed #aaa;}
    .info{margin-top:10px;font-size:15px;font-weight:bold;}

    .lang-btn, .theme-btn{
        padding:8px 15px;margin:5px;border-radius:8px;
        background:#3498db;color:#fff;cursor:pointer;border:none;
    }
    body.dark .lang-btn,body.dark .theme-btn{background:#555;}

    /* cropper modal */
    #cropModal{
        position:fixed;top:0;left:0;width:100%;height:100%;
        background:rgba(0,0,0,.8);display:none;align-items:center;
        justify-content:center;z-index:9999;
    }
    #cropArea{background:#fff;padding:10px;border-radius:12px;max-width:90%;}
    #cropImage{max-width:100%;height:auto;}
</style>
</head>

<body>

<div class="container">

    <div style="display:flex;justify-content:space-between;">
        <button class="lang-btn" onclick="toggleLang()">🌐 لغة</button>
        <button class="theme-btn" onclick="toggleTheme()">🌙/☀️</button>
    </div>

    <h2 id="title">محول الصور إلى PDF</h2>

    <label for="images" class="upload-btn" id="chooseBtn">اختر الصور</label>
    <input type="file" id="images" accept="image/*" multiple>

    <div class="info">عدد الصور: <span id="count">0</span></div>

    <div id="preview"></div>

    <div class="options">
        <label><input type="checkbox" id="compress"> ضغط الصور</label><br><br>

        <label>حجم الصفحة:
            <select id="pageSize">
                <option value="a4">A4</option>
                <option value="letter">Letter</option>
                <option value="a3">A3</option>
            </select>
        </label><br><br>

        <button onclick="clearAll()" style="background:#e74c3c">مسح الكل</button>
    </div>

    <button onclick="convertToPDF()">إنشاء PDF</button>
</div>

<div id="cropModal">
    <div id="cropArea">
        <img id="cropImage">
        <br><br>
        <button onclick="applyCrop()">قص</button>
        <button onclick="closeCrop()" style="background:#e74c3c">إلغاء</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
let imageFiles=[];let dragged;let currentCropIndex=null;let cropper;

document.getElementById("images").addEventListener("change",function(){
    imageFiles=[...this.files];displayImages();
});
function displayImages(){
    const p=document.getElementById("preview");p.innerHTML="";
    imageFiles.forEach((file,i)=>{
        const box=document.createElement("div");
        box.className="img-box";box.draggable=true;box.dataset.index=i;

        const img=document.createElement("img");
        img.src=URL.createObjectURL(file);
        img.onclick=()=>openCrop(i,file);

        const rm=document.createElement("div");
        rm.className="remove-btn";rm.textContent="×";
        rm.onclick=()=>removeImage(i);

        box.appendChild(img);box.appendChild(rm);p.appendChild(box);
    });
    document.getElementById("count").textContent=imageFiles.length;

    document.querySelectorAll(".img-box").forEach(b=>{
        b.addEventListener("dragstart",dragStart);
        b.addEventListener("dragover",e=>e.preventDefault());
        b.addEventListener("drop",dropImage);
        b.addEventListener("dragend",()=>b.classList.remove("dragging"));
    });
}

function dragStart(){dragged=this;this.classList.add("dragging");}

function dropImage(){
    let a=dragged.dataset.index,b=this.dataset.index;
    [imageFiles[a],imageFiles[b]]=[imageFiles[b],imageFiles[a]];
    displayImages();
}

function removeImage(i){imageFiles.splice(i,1);displayImages();}
function clearAll(){imageFiles=[];displayImages();}

function openCrop(i,file){
    currentCropIndex=i;
    document.getElementById("cropModal").style.display="flex";

    let reader=new FileReader();
    reader.onload=e=>{
        const img=document.getElementById("cropImage");
        img.src=e.target.result;
        if(cropper)cropper.destroy();
        cropper=new Cropper(img,{viewMode:1});
    };
    reader.readAsDataURL(file);
}

function closeCrop(){document.getElementById("cropModal").style.display="none";cropper.destroy();}

function applyCrop(){
    cropper.getCroppedCanvas().toBlob(blob=>{
        imageFiles[currentCropIndex]=new File([blob],"crop.jpg",{type:"image/jpeg"});
        closeCrop();displayImages();
    });
}

async function convertToPDF(){
    if(!imageFiles.length)return alert("اختر الصور أولاً");
    const {jsPDF}=window.jspdf;
    let pdf=new jsPDF({format:document.getElementById("pageSize").value});

    for(let i=0;i<imageFiles.length;i++){
        let img=await loadImage(imageFiles[i]);
        let w=pdf.internal.pageSize.getWidth();
        let h=(img.height/img.width)*w;
        if(document.getElementById("compress").checked){w*=0.9;h*=0.9;}
        if(i>0)pdf.addPage();
        pdf.addImage(img,"JPEG",0,0,w,h);
    }
    pdf.save("images.pdf");
}

function loadImage(f){
    return new Promise(r=>{
        let rd=new FileReader();
        rd.onload=e=>{let i=new Image();i.onload=()=>r(i);i.src=e.target.result;};
        rd.readAsDataURL(f);
    });
}

/* -------------- تغيير اللغة -------------- */

let lang="ar";
const texts={
    ar:{title:"محول الصور إلى PDF",choose:"اختر الصور","create":"إنشاء PDF","clear":"مسح الكل"},
    en:{title:"Image to PDF Converter",choose:"Choose Images","create":"Create PDF","clear":"Clear All"}
};

function toggleLang(){
    lang=lang==="ar"?"en":"ar";
    document.getElementById("title").textContent=texts[lang].title;
    document.getElementById("chooseBtn").textContent=texts[lang].choose;
    document.querySelector("button[onclick='convertToPDF()']").textContent=texts[lang].create;
    document.querySelector("button[onclick='clearAll()']").textContent=texts[lang].clear;
    document.body.style.direction=lang==="ar"?"rtl":"ltr";
}

/* -------------- الوضع الليلي -------------- */

function toggleTheme(){document.body.classList.toggle("dark");}

/* تشغيل الوضع حسب النظام */
if(window.matchMedia("(prefers-color-scheme:dark)").matches){
    document.body.classList.add("dark");
}
</script>
</body>
</html>
