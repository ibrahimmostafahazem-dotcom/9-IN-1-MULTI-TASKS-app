<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main Menu</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:"Cairo", sans-serif;
    direction:rtl;
    background:linear-gradient(135deg,#4c6ef5,#15aabf,#845ef7);
    background-size:400% 400%;
    animation:gradientMove 8s ease infinite;
    transition:0.35s;
}
.dark{
    background:linear-gradient(135deg,#0D1B2A,#1B263B,#0D1B2A);
    color:white;
}
@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}
header{
    text-align:center;
    padding:22px;
    color:white;
    font-size:28px;
    font-weight:bold;
    text-shadow:0 2px 8px #00000066;
}
#darkBtn{
    position:fixed;
    top:15px;
    left:15px;
    background:#00000088;
    color:white;
    padding:10px 18px;
    border-radius:12px;
    cursor:pointer;
    backdrop-filter:blur(4px);
    transition:.3s;
}
#darkBtn:hover{transform:scale(1.07);}
.container{
    width:90%;
    max-width:450px;
    margin:auto;
    margin-top:10px;
}
button{
    width:100%;
    padding:18px;
    border:none;
    margin:10px 0;
    font-size:20px;
    border-radius:15px;
    color:white;
    background:#1e1e1eaa;
    backdrop-filter:blur(4px);
    cursor:pointer;
    transition:.25s;
    text-shadow:0 2px 6px #00000066;
    display:flex;
    align-items:center;
    gap:12px;
}
button:hover{
    transform:scale(1.05);
    background:#000000cc;
    box-shadow:0 0 12px #ffffff66;
}
button svg{width:26px;height:26px;fill:white;}
.dark button{
    background:#1B263Bcc;
    color:white;
}
.dark button:hover{
    background:#415A77;
    box-shadow:0 0 12px #89a6ff;
}

button:active{transform:scale(0.97);}

</style>
</head>

<body>

<div id="darkBtn">Dark</div>

<header>📘 القائمة الرئيسية للتطبيق</header>

<div class="container">

<button onclick="openPage('Algebraic rules.html')">
<svg><path d="M5 3h14v2H5zm0 6h14v2H5zm0 6h14v2H5z"/></svg>
قواعد الجبر Algebra Rules
</button>

<button onclick="openPage('Calculator.html')">
<svg><path d="M7 2h10v20H7zm2 2v4h6V4zm0 6v2h6v-2zm0 4v2h6v-2z"/></svg>
الآلة الحاسبة Calculator
</button>

<button onclick="openPage('Image resizer.html')">
<svg><path d="M4 4h16v16H4zM7 7h6v6H7z"/></svg>
Image Resizer
</button>

<button onclick="openPage('Image to pdf.html')">
<svg><path d="M6 2h9l5 5v15H6zM14 2v6h6"/></svg>
Image To PDF
</button>

<button onclick="openPage('Notes.html')">
<svg><path d="M4 4h16v2H4zm0 6h16v2H4zm0 6h10v2H4z"/></svg>
Notes
</button>

<button onclick="openPage('Scan to text.html')">
<svg><path d="M3 3h6v2H5v4H3zm12 0h6v6h-2V5h-4zm4 12v4h-4v2h6v-6zM3 15h2v4h4v2H3z"/></svg>
Scan To Text
</button>

<button onclick="openPage('Study planner.html')">
<svg><path d="M4 4h16v16H4zM8 8h8v2H8zm0 4h8v2H8z"/></svg>
Study Planner
</button>

<button onclick="openPage('Translator.html')">
<svg><path d="M5 4h14v2H5zm4 4h10v2H9zm-4 4h14v2H5z"/></svg>
Translator
</button>

<button onclick="openPage('Vocabulary manager.html')">
<svg><path d="M4 6h16v12H4zM7 10h6v2H7z"/></svg>
Vocabulary Manager
</button>

</div>
<script>
function openPage(file){
    document.body.style.opacity="0";
    setTimeout(()=>{window.location.href=file;},200);
}

let dark=false;
document.getElementById("darkBtn").onclick=()=>{
    dark=!dark;
    document.body.classList.toggle("dark");
    document.getElementById("darkBtn").innerText=
        dark ? "Light" : "Dark";
};

// زر دخول مع أنيميشن
document.querySelectorAll("button").forEach(btn=>{
    btn.addEventListener("mouseenter",()=>{btn.style.transform="scale(1.06)"});
    btn.addEventListener("mouseleave",()=>{btn.style.transform="scale(1)"});
});
</script>

</body>
</html>
